<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breezound | Interactive Knowledge Lab</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }
        header { text-align: center; margin-bottom: 50px; }
        h1 { color: #ff9800; font-size: 2.5em; margin-bottom: 10px; }
        
        .lab-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }
        .tool-card {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #333;
            transition: transform 0.3s, border 0.3s;
            text-decoration: none;
            color: inherit;
        }
        .tool-card:hover {
            transform: translateY(-5px);
            border: 1px solid #ff9800;
        }
        .tool-card h3 { margin-top: 0; color: #ff9800; }
        .tool-card p { font-size: 0.9em; color: #aaa; }
    </style>
</head>
<body>

    <header>
        <h1>BREEZOUND LAB</h1>
        <p>Interactive Tools for Professional Sound Engineering</p>
    </header>

    <div class="lab-container">
        <a href="src/" class="tool-card">
            <h3>Audio RTL Simulator</h3>
            <p>วิเคราะห์ความหน่วง Round Trip Latency สำหรับระบบ Network Audio และ DAW</p>
        </a>

        <a href="sbir-sim/" class="tool-card">
            <h3>SBIR Calculator</h3>
            <p>คำนวณการหักล้างของย่านความถี่ต่ำจากการสะท้อนของผนังห้อง</p>
        </a>
    </div>

</body>
</html>
