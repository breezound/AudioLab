<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>BREEZOUND CARDIOID SUB SIMULATOR</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="bz-simulator-wrapper">
  <div class="bz-header">
    <h2>BREEZOUND <span>SUBWOOFER ALIGNMENT DSP</span></h2>
  </div>

  <div class="bz-layout">
    <div class="bz-panel bz-visualizer">
      <div class="canvas-container">
        <canvas id="polarCanvas" width="600" height="600"></canvas>
      </div>
      <div class="plot-labels">
        <span class="label-top">AUDIENCE (0°)</span>
        <span class="label-bottom">STAGE (180°)</span>
      </div>
    </div>

    <div class="bz-panel bz-console">
      <div class="bz-section">
        <h3>ARRAY CONFIGURATION</h3>
        <div class="bz-presets">
          <button id="btnEndfire" class="bz-btn active">ENDFIRE ARRAY</button>
          <button id="btnGradient" class="bz-btn">GRADIENT STACK</button>
        </div>
        
        <div class="bz-control-group">
          <div class="bz-control-header">
            <label>Frequency (Hz)</label>
            <output id="outFreq">80</output>
          </div>
          <input type="range" id="slFreq" min="30" max="150" step="1" value="80">
        </div>

        <div class="bz-control-group">
          <div class="bz-control-header">
            <label>Physical Spacing / Depth (m)</label>
            <output id="outSpacing">1.0</output>
          </div>
          <input type="range" id="slSpacing" min="0.4" max="3.0" step="0.1" value="1.0">
        </div>
      </div>

      <div class="bz-section">
        <h3>DSP ALIGNMENT (TIME & PHASE)</h3>
        
        <div class="bz-channel sub-a">
          <h4>SUB A (FRONT / DOWNSTAGE)</h4>
          <div class="bz-control-group">
            <div class="bz-control-header">
              <label>Delay (ms)</label>
              <output id="outDelayA">2.91</output>
            </div>
            <input type="range" id="slDelayA" min="0" max="20" step="0.01" value="2.91">
          </div>
        </div>

        <div class="bz-channel sub-b">
          <h4>SUB B (REAR / UPSTAGE)</h4>
          <div class="bz-control-group">
            <div class="bz-control-header">
              <label>Delay (ms)</label>
              <output id="outDelayB">0.00</output>
            </div>
            <input type="range" id="slDelayB" min="0" max="20" step="0.01" value="0">
          </div>
          
          <div class="bz-control-group">
            <div class="bz-control-header">
              <label>Gain (dB) <span class="hint">*Equal Magnitude</span></label>
              <output id="outGainB">0.0</output>
            </div>
            <input type="range" id="slGainB" min="-18" max="0" step="0.1" value="0">
          </div>

          <div class="bz-toggle-group">
            <label>Polarity</label>
            <label class="bz-switch">
              <input type="checkbox" id="chkPolB">
              <span class="bz-slider-switch"></span>
            </label>
            <span id="txtPolB" class="pol-label">NORMAL (0°)</span>
          </div>
        </div>
      </div>

      <div style="text-align: center; margin-top: 25px; padding-bottom: 20px;">
    <a href="https://breezound.github.io/AudioLab/" 
       style="display: inline-block; padding: 10px 24px; background-color: #ff9800; color: #1a1a1a; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 14px; border: 1px solid #ff9800;">
       BreezoundLaB
    </a>
</div>
    </div>
  </div>
</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
